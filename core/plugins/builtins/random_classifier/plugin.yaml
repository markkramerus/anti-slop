name: random_classifier
version: 0.1.0
kind: classifier
author: anti_slop_team
description: Random baseline classifier for framework plumbing tests. Assigns each comment a random label drawn from configurable probabilities.
entrypoint: plugin.py:Plugin
inputs:
  required:
    - comment_text
outputs:
  per_comment:
    - pred_label
    - score_ai
    - confidence
    - explanation_json
parameters:
  seed:
    type: int
    default: 42
    description: Random seed for reproducible outputs
  p_ai:
    type: float
    default: 0.33
    min: 0.0
    max: 1.0
    description: Probability of ai_generated
  p_human:
    type: float
    default: 0.33
    min: 0.0
    max: 1.0
    description: Probability of human
  p_uncertain:
    type: float
    default: 0.34
    min: 0.0
    max: 1.0
    description: Probability of uncertain
